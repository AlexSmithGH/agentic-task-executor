name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - alexasmi

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I do X, Y happens instead of Z
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Start the service with '...'
        2. Send request to '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The workflow should complete successfully
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The workflow failed with error X
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - API Server
        - Temporal Worker
        - Workflow
        - Activity (Git Operations)
        - Activity (Agent Runtime)
        - Activity (GitHub Operations)
        - Agent/Claude Integration
        - Docker/Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (please use code blocks)
      render: shell
      placeholder: |
        Paste logs here

  - type: textarea
    id: workflow-id
    attributes:
      label: Temporal Workflow ID
      description: If applicable, provide the workflow ID for debugging
      placeholder: task-abc-123-def-456

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: v0.1.0 or git commit hash
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this occur?
      options:
        - Local Development
        - Docker Compose
        - Kubernetes
        - Production
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant environment variables (redact secrets!)
      render: shell
      placeholder: |
        GCP_PROJECT_ID=my-project
        GCP_REGION=us-east5
        TEMPORAL_HOST=localhost:7233

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: This started happening after upgrading to...
