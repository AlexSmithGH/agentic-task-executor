name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.55.2
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build API
        run: go build -v -o bin/api ./cmd/api

      - name: Build Worker
        run: go build -v -o bin/worker ./cmd/worker

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  audit:
    name: AI/Agentic SDLC Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate AI/Agentic SDLC Readiness
        run: |
          echo "Validating AI/Agentic SDLC Readiness..."
          chmod +x validate_audit.sh
          ./validate_audit.sh

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: agentic-task-executor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, audit]
    if: always()
    steps:
      - name: Check if all jobs passed
        run: |
          echo "Job Results:"
          echo "  lint: ${{ needs.lint.result }}"
          echo "  test: ${{ needs.test.result }}"
          echo "  build: ${{ needs.build.result }}"
          echo "  security: ${{ needs.security.result }}"
          echo "  audit: ${{ needs.audit.result }}"
          echo ""
          
          # Check if all required jobs succeeded
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint check did not succeed (status: ${{ needs.lint.result }})"
            exit 1
          fi
          
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Test check did not succeed (status: ${{ needs.test.result }})"
            exit 1
          fi
          
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build check did not succeed (status: ${{ needs.build.result }})"
            exit 1
          fi
          
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Security check did not succeed (status: ${{ needs.security.result }})"
            exit 1
          fi
          
          if [ "${{ needs.audit.result }}" != "success" ]; then
            echo "❌ Audit check did not succeed (status: ${{ needs.audit.result }})"
            exit 1
          fi
          
          echo "✅ All checks passed successfully!"
