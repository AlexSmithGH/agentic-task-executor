# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files
# Reference: https://pre-commit.com/

repos:
  # Go formatting
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        name: Run gofmt
        description: Formats Go code
        
      - id: go-imports
        name: Run goimports
        description: Formats Go imports
        args: [-local, github.com/alexasmi/agentic-task-executor]
        
      - id: go-mod-tidy
        name: Run go mod tidy
        description: Ensures go.mod and go.sum are up to date

  # Go linting
  - repo: local
    hooks:
      - id: golangci-lint
        name: Run golangci-lint
        description: Runs golangci-lint on all Go files
        entry: golangci-lint
        args: [run, --fix]
        language: system
        files: \.go$
        pass_filenames: false

  # Go testing (fast unit tests only)
  - repo: local
    hooks:
      - id: go-test-short
        name: Run Go tests
        description: Runs fast Go unit tests
        entry: go
        args: [test, -short, ./...]
        language: system
        files: \.go$
        pass_filenames: false

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.25.0
    hooks:
      - id: gitleaks
        name: Detect secrets
        description: Scans for hardcoded secrets and credentials

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
        args: [--allow-multiple-documents]
        
      - id: check-json
        name: Check JSON syntax
        
      - id: check-toml
        name: Check TOML syntax
        
      - id: check-merge-conflict
        name: Check for merge conflicts
        
      - id: check-added-large-files
        name: Prevent large files
        args: [--maxkb=1000]
        
      - id: check-case-conflict
        name: Check for case conflicts
        
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: \.svg$
        
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
        
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args: [--fix]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfile

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [-d, '{extends: default, rules: {line-length: {max: 120}, comments: {min-spaces-from-content: 1}}}']

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: Lint shell scripts

# Configuration
default_language_version:
  python: python3

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [golangci-lint, go-test-short]  # Skip local hooks in CI
  submodules: false
